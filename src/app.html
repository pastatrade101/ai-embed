<!doctype html>
<html lang="en" style="background:#0a231b">
	<head>
		<meta charset="utf-8" />
		<script>
			// Apply the saved dashboard theme before first paint to avoid a flash.
			(function () {
				try {
					var t = localStorage.getItem('mk_theme') || 'dark';
					document.documentElement.setAttribute('data-theme', t);
					document.documentElement.style.background = t === 'light' ? '#f6f7f4' : '#0a231b';
				} catch (e) {}
			})();
		</script>
		<link rel="icon" href="/ICON-AI.png" />
		<link rel="apple-touch-icon" href="/ICON-AI.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
