# Makutano Digital — single-container deployment.
#
#   cp .env.example .env      # fill in Supabase / Anthropic / Voyage / Resend / AUTH_SECRET
#   docker compose up -d --build
#
# App:  http://localhost:3000
#
# The app reads all secrets at RUNTIME (env_file below), so the image contains
# no credentials and the same image works across environments. When deploying to
# a real domain behind a proxy, set ORIGIN=https://your-domain (or APP_ORIGIN in
# .env) so form logins/settings pass SvelteKit's CSRF origin check.

services:
  app:
    build: .
    image: makutano-digital
    container_name: makutano-digital
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    # Injects your .env (SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, ANTHROPIC_API_KEY,
    # VOYAGE_API_KEY, RESEND_API_KEY, AUTH_SECRET, ...) into the container at runtime.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      # Public origin of this server — REQUIRED behind a domain/proxy, or logins and
      # every form POST fail SvelteKit's CSRF check. Set APP_ORIGIN in .env to your
      # https domain, e.g. APP_ORIGIN=https://ai.makutano.co.tz
      ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      # Behind a TLS-terminating reverse proxy (nginx/Caddy/Traefik), let adapter-node
      # build correct https redirect URLs from the proxy's forwarded headers.
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
